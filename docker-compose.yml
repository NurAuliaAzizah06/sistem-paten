services:
  web:
    build: .  # Ini akan menjalankan perintah di Dockerfile tadi
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - TZ=Asia/Makassar
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password_paten
      MYSQL_DATABASE: db_paten
       TZ=Asia/Makassar
    ports:
      - "3306:3306"